services:
  postgres:
    image: docker.io/pgvector/pgvector:pg17
    container_name: inbox-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox
      POSTGRES_DB: inbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox -d inbox"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: inbox-server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://inbox:inbox@postgres:5432/inbox
      BLOB_STORAGE_PATH: /blobs
    volumes:
      - blobs:/blobs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  blobs:
